services:
  - type: web
    name: gestorpass-colombia
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gestorpass-db
          property: connectionString
      - key: ENCRYPTION_KEY
        sync: false   # <-- DEBES configurar este valor manualmente en el dashboard de Render

databases:
  - name: gestorpass-db
    databaseName: gestorpass
    plan: free
